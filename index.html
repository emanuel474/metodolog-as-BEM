<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Card EBM</title>
</head>

<body>
    <div class="card">
        <img src="assets/images/07d09445e2b481cb5ffbb27e7d86033a.jpg" alt="" class="card__img">

        <div class="card__content">
            <h2 class="card__content__title">Aprendices ADSO</h2>
            <p class="card__content__desc">Los estudiantes de ADSO estan al dia con las tecnologias BEM en CSS</p>
        </div>

        <div class="card__actions">
            <button class="card__button card__button--primary">Aceptar</button>
            <button class="card__button card__button--secundary">Cancelar</button>
        </div>
    </div>
</body>

</html>
